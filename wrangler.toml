# Interim deploy target while this repo is PRIVATE: a static-assets-only
# Cloudflare Worker (same `ciphers` worker name = keeps the custom domain).
# When the repo goes public: re-enable GitHub Pages, CNAME the domain to
# jpillora.github.io, and delete this Worker + this file.
name = "ciphers"
compatibility_date = "2025-10-18"

routes = [
  { pattern = "ciphers.jpillora.com", custom_domain = true }
]

[assets]
directory = "."
